<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Analytics Dashboard</title>
    <link rel="icon" href="https://www.youtube.com/favicon.ico" type="image/x-icon">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome for clean modern icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local Modern Custom Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="/" class="logo">
            <div class="logo-box"></div>
            <h2>YT Analytics</h2>
        </a>
        
        <div class="menu">
            <a href="/"><i class="fa-solid fa-chart-pie"></i>Dashboard</a>
            <a href="/analytics"><i class="fa-solid fa-chart-line"></i>Analytics</a>
            <a href="/videos"><i class="fa-solid fa-video"></i>Videos</a>
            <a href="/reports"><i class="fa-solid fa-square-poll-vertical"></i>Reports</a>
            <a href="/settings"><i class="fa-solid fa-gear"></i>Settings</a>
        </div>

        <div class="sidebar-bottom">
            <a href="/logout" class="logout-link">
                <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Restore saved theme on every page -->
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
    <!-- Dynamic navigation active class -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const currentPath = window.location.pathname;
            const menuLinks = document.querySelectorAll(".sidebar .menu a");
            menuLinks.forEach(link => {
                const href = link.getAttribute("href");
                if (href === currentPath || (currentPath.startsWith(href) && href !== '/')) {
                    link.classList.add("active");
                }
            });
        });
    </script>
</body>
</html>
